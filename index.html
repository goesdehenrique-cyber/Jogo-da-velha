<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Moderno</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #252542);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            height: 30px;
            font-weight: bold;
            color: #a0a0c0;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background-color: #333355;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .cell {
            background-color: #1f1f38;
            border: none;
            border-radius: 5px;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .cell:hover {
            background-color: #2a2a4e;
        }

        .cell.X {
            color: #ff4a5a;
            text-shadow: 0 0 8px rgba(255, 74, 90, 0.5);
        }

        .cell.O {
            color: #00ffcc;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
        }

        .btn-reset {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #00ffcc;
            color: #1f1f38;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
        }

        .btn-reset:hover {
            background-color: #00ddb0;
            transform: scale(1.05);
        }

        .btn-reset:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>JOGO DA VELHA</h1>
    <div class="status" id="status">Vez do jogador X</div>

    <div class="board" id="board">
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
    </div>

    <button class="btn-reset" id="resetBtn">Reiniciar Jogo</button>

    <script>
        const boardElement = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusElement = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');

        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let isGameActive = true;

        // Combinações da vitória
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Linhas
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Colunas
            [0, 4, 8], [2, 4, 6]             // Diagonais
        ];

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            // Verifica se a célula já está ocupada ou se o jogo acabou
            if (board[clickedCellIndex] !== "" || !isGameActive) {
                return;
            }

            updateCell(clickedCell, clickedCellIndex);
            checkResult();
        }

        function updateCell(cell, index) {
            board[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer);
        }

        function checkResult() {
            let roundWon = false;

            for (let i = 0; i < winningConditions.length; i++) {
                const winCondition = winningConditions[i];
                let a = board[winCondition[0]];
                let b = board[winCondition[1]];
                let c = board[winCondition[2]];

                if (a === '' || b === '' || c === '') {
                    continue;
                }
                if (a === b && b === c) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusElement.textContent = `Jogador ${currentPlayer} Venceu! 🎉`;
                statusElement.style.color = currentPlayer === 'X' ? '#ff4a5a' : '#00ffcc';
                isGameActive = false;
                return;
            }

            // Verifica empate (Velha)
            let roundDraw = !board.includes("");
            if (roundDraw) {
                statusElement.textContent = "Deu Velha! 🤝";
                statusElement.style.color = "#a0a0c0";
                isGameActive = false;
                return;
            }

            // Muda o jogador
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusElement.textContent = `Vez do jogador ${currentPlayer}`;
            statusElement.style.color = "#a0a0c0";
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            isGameActive = true;
            currentPlayer = "X";
            statusElement.textContent = `Vez do jogador ${currentPlayer}`;
            statusElement.style.color = "#a0a0c0";
            
            cells.forEach(cell => {
                cell.textContent = "";
                cell.classList.remove('X', 'O');
            });
        }

        // Event Listeners
        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', resetGame);
    </script>
</body>
</html>
